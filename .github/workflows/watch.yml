name: watch

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

concurrency:
  group: watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: astral-sh/setup-uv@v6 # fliがuvxでPython版CLIを叩くために必要
      - run: bun install --frozen-lockfile
      - name: watch
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: |
          bun run src/cli.ts watch --once --json || [ $? -eq 2 ]
      - name: commit data
        run: |
          git config user.name "tfw-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data/; then
            git add data/
            git commit -m "data: watch $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase && git push
          fi
